<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#68d8c1" />
  <link rel="manifest" href="/manifest.json" />
  <title>My Life Quest</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>🌿 My Life Quest</h1>
      <p>Small steps. Gentle progress. Real momentum.</p>
    </div>
    <button id="visionBtn" class="secondary">Vision</button>
  </header>

  <main>
    <section id="today" class="screen active"></section>
    <section id="tasks" class="screen"></section>
    <section id="routines" class="screen"></section>
    <section id="projects" class="screen"></section>
    <section id="goals" class="screen"></section>
    <section id="rewards" class="screen"></section>
    <section id="progress" class="screen"></section>
  </main>

  <button id="fab" class="fab" aria-label="Quick add">＋</button>

  <nav>
    <button data-tab="today" class="active">Today</button>
    <button data-tab="tasks">Tasks</button>
    <button data-tab="routines">Routines</button>
    <button data-tab="projects">Projects</button>
    <button data-tab="goals">Goals</button>
    <button data-tab="rewards">Rewards</button>
    <button data-tab="progress">Progress</button>
  </nav>

  <dialog id="modal"></dialog>
  <div id="toast"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    window.firebaseModules = {
      initializeApp,
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged,
      getFirestore,
      doc,
      setDoc,
      getDoc,
      onSnapshot,
      serverTimestamp
    };

    window.dispatchEvent(new Event("firebase-modules-ready"));
  </script>

  <script src="/app.js"></script>
</body>
</html>
